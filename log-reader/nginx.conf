server {
    listen 80;
    charset utf-8;

    # Redirect bare / to the reader page.
    location = / {
        return 302 /reader.html;
    }

    location = /reader.html {
        root /usr/share/nginx/html;
    }

    # Agent JSONL logs (shared with backend via docker-compose volume).
    location /logs/ {
        alias /srv/agent-logs/;
        autoindex on;
        autoindex_format html;
    }
}
