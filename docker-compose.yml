services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./volumes/backend-home:/home/mike
      - ./volumes/agent-logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  log-reader:
    build:
      context: .
      dockerfile: log-reader/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./volumes/agent-logs:/srv/agent-logs:ro
    restart: unless-stopped
